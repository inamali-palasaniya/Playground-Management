name: EAS OTA Update

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'  # Only trigger when mobile code changes

jobs:
  update:
    name: Push EAS OTA Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Push EAS OTA Update
        working-directory: mobile
        run: npx eas-cli update --channel production --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
